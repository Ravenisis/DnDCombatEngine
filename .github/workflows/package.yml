name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and build tools
        run: python -m pip install -e ".[dev,gui,installer]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Build wheel and source distribution
        run: python -m build

      - name: Build Windows executable
        shell: pwsh
        run: .\scripts\build_windows.ps1 -SkipInstall

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: .\scripts\build_installer.ps1 -SkipExecutableBuild

      - name: Install WiX Toolset
        run: winget install --id WiXToolset.WiXCLI --accept-package-agreements --accept-source-agreements

      - name: Build Windows MSI installer
        shell: pwsh
        run: .\scripts\build_msi.ps1 -SkipExecutableBuild

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*.*

      - name: Upload Windows executable folder
        uses: actions/upload-artifact@v4
        with:
          name: DnDCombatEngine-windows
          path: dist/DnDCombatEngine/**

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DnDCombatEngine-installer
          path: dist/installer/*.exe

      - name: Upload Windows MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: DnDCombatEngine-msi
          path: dist/msi/*.msi
