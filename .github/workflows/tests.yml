name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package and GUI test dependencies
        run: python -m pip install -e ".[dev,gui]"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Import smoke test
        run: >-
          python -c "import dnd_combat_engine;
          from dnd_combat_engine.app import create_app;
          from dnd_combat_engine.controllers import CombatController;
          from dnd_combat_engine.models import Character, HitPoints;
          print('core imports ok')"

      - name: GUI import smoke test
        run: >-
          python -c "from dnd_combat_engine.gui import main_window;
          from dnd_combat_engine.gui.action_bar import ActionBarSession;
          from dnd_combat_engine.gui.widgets import PartyFramesWidget;
          print('gui imports ok')"

      - name: Full test suite with coverage gate
        run: python -m pytest --cov-fail-under=90
