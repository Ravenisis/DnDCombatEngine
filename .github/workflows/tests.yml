name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Install Windows GUI smoke dependencies
        if: runner.os == 'Windows'
        run: python -m pip install -e ".[gui]"

      - name: Lint
        run: python -m ruff check .

      - name: Import smoke test
        run: >-
          python -c "import dnd_combat_engine;
          from dnd_combat_engine.app import create_app;
          from dnd_combat_engine.controllers import CombatController;
          from dnd_combat_engine.models import Character, HitPoints;
          print('core imports ok')"

      - name: Windows GUI import smoke test
        if: runner.os == 'Windows'
        run: >-
          python -c "from dnd_combat_engine.gui import main_window;
          from dnd_combat_engine.gui.action_bar import ActionBarSession;
          from dnd_combat_engine.gui.widgets import PartyFramesWidget;
          print('windows gui imports ok')"

      - name: Test
        run: python -m pytest

  gui-smoke:
    name: GUI smoke / Ubuntu / Python 3.11
    runs-on: ubuntu-latest
    env:
      DND_COMBAT_ENGINE_GUI_SMOKE: "1"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install GUI smoke test dependencies
        run: python -m pip install -e ".[dev,gui-test]"

      - name: Run GUI smoke tests
        run: python -m pytest -m gui --no-cov
